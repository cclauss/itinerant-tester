name: lua_compat_53_test
on:
  push:
    paths:
      - '.github/workflows/lua_compat_53_test.yml'
  pull_request:
    paths:
      - '.github/workflows/lua_compat_53_test.yml'
  workflow_dispatch:
jobs:
  lua_compat_53_test:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        luaVersion: ["5.1", "5.2", "5.3", "5.4", "5.5"]
        compiler: [gcc]
        external: [true, false]
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          repository: lunarmodules/lua-compat-5.3
      - name: install Lua
        run: |
          sudo apt install libreadline-dev
          pip3 install --user hererocks
          ~/.local/bin/hererocks old --lua=${{ matrix.luaVersion }}
          test -e old/bin/lua || (cd old/bin && ln -s luajit* lua)
          ~/.local/bin/hererocks new --lua=5.3
      - name: compile C modules
        run: |
          export CC=${{ matrix.compiler }} CFLAGS="-Wall -Wextra -Ic-api -O2 -fPIC"
          export DEF="" SRC=""
          if [ "${{ matrix.external }}" = true ]; then DEF="-DCOMPAT53_PREFIX=compat53" SRC="c-api/compat-5.3.c"; fi
          ${CC} ${CFLAGS} -Iold/include ${DEF} -shared -o old/testmod.so tests/testmod.c ${SRC}
          ${CC} ${CFLAGS} -Inew/include ${DEF} -shared -o new/testmod.so tests/testmod.c ${SRC}
          ${CC} ${CFLAGS} -Iold/include ${DEF} -shared -o old/compat53.so ltablib.c lutf8lib.c lstrlib.c liolib.c ${SRC}
      - name: run test scripts
        run: |
          mkdir -p old
          mkdir -p new
          (cd old && bin/lua ../tests/test.lua) > old.txt
          (cd new && bin/lua ../tests/test.lua) > new.txt
      - name: compare script output
        run: diff old.txt new.txt || true

  hererocks:
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        luaVersion: ["5.1", "5.2", "5.3", "5.4", "5.5", "latest"]
        luaRocksVersion: ["latest"]
        pypi: [true]
        include:
          - os: [ubuntu-latest]
            luaVersion: "5.4"
            luaRocksVersion: "3.13.0"
            pypi: true
          - os: [macos-latest]
            luaVersion: "5.4"
            luaRocksVersion: "latest"
            pypi: true
          - os: [windows-latest]
            luaVersion: "5.4"
            luaRocksVersion: "latest"
            pypi: true
          # Tests for pypi: false
          - os: [ubuntu-latest]
            luaVersion: "latest"  # v5.5.0!
            luaRocksVersion: "latest"  # v3.13.0!
            pypi: false
          - os: [macos-latest]
            luaVersion: "latest"  # v5.5.0!
            luaRocksVersion: "latest"  # v3.13.0!
            pypi: false
          - os: [windows-latest]
            luaVersion: "latest"  # v5.5.0!
            luaRocksVersion: "latest"  # v3.13.0!
            pypi: false
    runs-on: ${{ matrix.os }}
    steps:
      - if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libreadline-dev
      - uses: actions/checkout@v7
        with:
          repository: luarocks/hererocks
      - if: ${{ matrix.pypi }}
        run: pipx run hererocks lua --lua=${{ matrix.luaVersion }} --luarocks=${{ matrix.luaRocksVersion }}
      - if: ${{ !matrix.pypi }}
        env:
          SPEC: git+https://github.com/luarocks/hererocks.git
        run: pipx run --spec=$SPEC hererocks lua --lua=${{ matrix.luaVersion }} --luarocks=${{ matrix.luaRocksVersion }}
      - if: runner.os != 'Windows'
        run: |
          source lua/bin/activate  # Adds 'lua/bin' to $PATH.
          lua -v && luarocks --version
          luarocks install luacheck
          luacheck --version

      - if: runner.os == 'Windows'
        run: |
          lua\bin\activate  # Adds 'lua/bin' to $PATH.
          lua -v && luarocks --version
          luarocks install luacheck
          luacheck --version

  hererocks-uv:
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        luaVersion: ["5.1", "5.2", "5.3", "5.4", "5.5", "latest"]
        luaRocksVersion: ["latest"]
        pypi: [true]
        include:
          - os: [ubuntu-latest]
            luaVersion: "5.4"
            luaRocksVersion: "3.13.0"
            pypi: true
          - os: [macos-latest]
            luaVersion: "5.4"
            luaRocksVersion: "latest"
            pypi: true
          - os: [windows-latest]
            luaVersion: "5.4"
            luaRocksVersion: "latest"
            pypi: true
          # Tests for pypi: false
          - os: [ubuntu-latest]
            luaVersion: "latest"  # v5.5.0!
            luaRocksVersion: "latest"  # v3.13.0!
            pypi: false
          - os: [macos-latest]
            luaVersion: "latest"  # v5.5.0!
            luaRocksVersion: "latest"  # v3.13.0!
            pypi: false
          - os: [windows-latest]
            luaVersion: "latest"  # v5.5.0!
            luaRocksVersion: "latest"  # v3.13.0!
            pypi: false
    runs-on: ${{ matrix.os }}
    steps:
      - if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libreadline-dev
      - uses: actions/checkout@v7
        with:
          repository: luarocks/hererocks
      - uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
      - if: ${{ matrix.pypi }}
        run: uvx hererocks lua --lua=${{ matrix.luaVersion }} --luarocks=${{ matrix.luaRocksVersion }}
      - if: ${{ !matrix.pypi }}
        env:
          SPEC: git+https://github.com/luarocks/hererocks.git
        run: uvx --spec=$SPEC hererocks lua --lua=${{ matrix.luaVersion }} --luarocks=${{ matrix.luaRocksVersion }}
      - if: runner.os != 'Windows'
        run: |
          source lua/bin/activate  # Adds 'lua/bin' to $PATH.
          lua -v && luarocks --version
          luarocks install luacheck
          luacheck --version

      - if: runner.os == 'Windows'
        run: |
          lua\bin\activate  # Adds 'lua/bin' to $PATH.
          lua -v && luarocks --version
          luarocks install luacheck
          luacheck --version
