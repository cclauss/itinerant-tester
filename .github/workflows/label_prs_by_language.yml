name: Label PRs by language

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  labels_by_language:
    runs-on: ubuntu-slim
    steps:
    - uses: actions/checkout@v6
    - uses: actions/github-script@v8
      with:
        script: |
          const files = await github.paginate(github.rest.pulls.listFiles, {
            owner: context.repo.owner,
            repo: context.repo.repo,
            pull_number: context.issue.number,
            per_page: 100,
          });

          const filePaths = files.map((file) => file.filename);
          const languageMap = {
            Python: ['.py', '.pyi'],
            Cython: ['.pyx', '.pxd', '.pxi'],
            JavaScript: ['.js', '.jsx'],
            Lua: ['.lua'],
            TypeScript: ['.ts', '.tsx'],
            C: ['.c', '.h'],
            'C++': ['.cpp', '.cc', '.cxx', '.hpp', '.hh', '.hxx'],
            Rust: ['.rs'],
            Go: ['.go'],
          };

          # If any modified file has an extension, then add the label.
          const labels = Object.entries(languageMap)
            .filter(([_, exts]) =>
              exts.some(ext => filePaths.some(path => path.endsWith(ext)))
            )
            .map(([label]) => label);

          if (labels.length > 0) {
            github.rest.issues.addLabels({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels,
            })
          }
