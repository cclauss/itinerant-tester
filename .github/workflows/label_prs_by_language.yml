name: Label PRs by language

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  labels_by_language:
    runs-on: ubuntu-slim
    steps:
    - uses: actions/checkout@v6
    - name: Detect changed files
      id: changed-files
      uses: actions/github-script@v8
      with:
        script: |
          const files = await github.paginate(github.rest.pulls.listFiles, {
            owner: context.repo.owner,
            repo: context.repo.repo,
            pull_number: context.issue.number,
            per_page: 100,
          });

          const filePaths = files.map((file) => file.filename);
          const hasLua = filePaths.some((path) => path.endsWith('.lua'));
          const hasPython = filePaths.some((path) => path.endsWith('.py'));

          core.setOutput('has_lua', String(hasLua));
          core.setOutput('has_python', String(hasPython));
    - name: Add language labels if needed
      if: steps.changed-files.outputs.has_lua == 'true' || steps.changed-files.outputs.has_python == 'true'
      uses: actions/github-script@v8
      with:
        script: |
          const labels = [];
          if ('${{ steps.changed-files.outputs.has_lua }}' === 'true') {
            labels.push('Lua');
          }
          if ('${{ steps.changed-files.outputs.has_python }}' === 'true') {
            labels.push('Python');
          }

          github.rest.issues.addLabels({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            labels,
          })
